name: nimah_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.7
  firebase_app_check: ^0.2.2+7
  firebase_messaging: ^14.9.4

  # UI
  flutter_local_notifications: ^21.0.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.7
  fl_chart: ^0.68.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0

  # Utilities
  shared_preferences: ^2.2.2
  image_picker: ^1.1.1
  intl: any
  http: ^1.2.0
  url_launcher: ^6.2.5
  googleapis: ^13.0.0
  googleapis_auth: ^1.4.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/nimah_logo_512.png"



  # Utilities
  environment:
    sdk: ">=3.0.0 <4.0.0"
  image_picker: ^1.1.1

  intl: any

  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.10.0


  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/